services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: appuser
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      # Keep legacy lowercase names only for existing examples/tests.
      robin_username: ${ROBINHOOD_USERNAME:-}
      robin_password: ${ROBINHOOD_PASSWORD:-}
      robin_mfa: ${ROBINHOOD_2FA_KEY:-}
    volumes:
      - type: bind
        source: .
        target: /app
